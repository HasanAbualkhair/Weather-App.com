<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 viewport-fit=cover">
    <title>Weather App</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body class="bg-default">

    <div class="box">
        <h1>Weather App</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search country or city..." spellcheck="false">
            <button id="searchBtn" type="button" title="Search"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>

       <div class="weather-card">
            <div class="main-info">
                <img src="https://openweathermap.org/img/wn/01d@4x.png" class="weatherIcon" id="weatherIcon" alt="Weather Icon">
                <h1 class="temp" id="temp">--°C</h1>
                <p class="description" id="description">Enter a country or city to begin</p>
                <h2 class="countryName" id="countryName">--</h2>
                <h3 class="cityName" id="cityName">--</h3>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fa-solid fa-droplet"></i>
                    <div>
                        <p class="val" id="humidity">--</p>
                        <p class="label">Humidity</p>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fa-solid fa-wind"></i>
                    <div>
                        <p class="val" id="wind">--</p>
                        <p class="label">Wind Speed</p>
                    </div>
                </div>
            </div>

            <div class="forecast-box">
                <h3>5-Day Forecast</h3>
                <div class="forecast-list" id="forecastList">
                </div>
            </div>
        </div>
    </div>
        
    <script src="assets/js/javascript.js"></script>
</body>
</html>
